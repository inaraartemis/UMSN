services:
  # Backend Web Service (FastAPI)
  - type: web
    name: abode-backend
    env: python
    buildCommand: pip install -r requirements_hostel.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: abode-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PROJECT_NAME
        value: Abode Residential

databases:
  # PostgreSQL Database
  - name: abode-db
    plan: free
    region: oregon
