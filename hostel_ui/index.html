<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abode · Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #0a0b1e;
            --card: #151736;
            --border: #34387a;
            --accent: #b794f4;
            --accent2: #d6bcfa;
            --blue: #63b3ed;
            --accent-glow: rgba(183, 148, 244, 0.15);
            --text: #e2e8f0;
            --muted: #4a5568;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 55% at 22% -5%, rgba(183, 148, 244, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 80% 98%, rgba(99, 179, 237, 0.07) 0%, transparent 55%);
            pointer-events: none
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none
        }

        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 390px;
            padding: 1.5rem
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 17px;
            background: linear-gradient(135deg, #b794f4, #63b3ed);
            box-shadow: 0 0 40px rgba(183, 148, 244, 0.25);
            margin-bottom: 1rem;
        }

        .brand-logo svg {
            width: 26px;
            height: 26px;
            color: white
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #f7fafc
        }

        .brand h1 span {
            color: var(--accent2);
            font-weight: 800
        }

        .brand p {
            color: var(--muted);
            font-size: 0.78rem;
            margin-top: 5px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.85rem;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 13px;
            padding: 4px;
            margin-bottom: 1.5rem
        }

        .tab {
            padding: 8px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s
        }

        .tab:hover {
            color: var(--text)
        }

        .tab.active {
            background: rgba(183, 148, 244, 0.15);
            color: var(--accent2);
            font-weight: 600;
            border: 1px solid rgba(183, 148, 244, 0.22)
        }

        .fg {
            margin-bottom: 1rem
        }

        .fg label {
            display: block;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--muted);
            margin-bottom: 6px
        }

        .fg input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(52, 56, 122, 0.9);
            border-radius: 11px;
            padding: 10px 13px;
            color: #f7fafc;
            font-family: inherit;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s
        }

        .fg input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow)
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #b794f4, #63b3ed);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: opacity 0.15s, transform 0.15s;
            box-shadow: 0 5px 20px rgba(183, 148, 244, 0.22)
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-1px)
        }

        .btn-login:active {
            transform: translateY(0)
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed
        }

        .err {
            background: rgba(254, 178, 178, 0.08);
            border: 1px solid rgba(254, 178, 178, 0.2);
            color: #feb2b2;
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.78rem;
            margin-bottom: 1rem;
            display: none
        }

        .hint {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.73rem;
            color: var(--muted)
        }

        .hint a {
            color: var(--accent2);
            cursor: pointer;
            text-decoration: none
        }

        .hint a:hover {
            text-decoration: underline
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="brand">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
            <h1><span>Abode</span></h1>
            <p>University Residential Management Platform</p>
        </div>
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="setRole('admin@hostel.com','admin123',this)">Admin</button>
                <button class="tab" onclick="setRole('warden@hostel.com','warden123',this)">Warden</button>
                <button class="tab" onclick="setRole('student@hostel.com','student123',this)">Student</button>
            </div>
            <div class="err" id="errBox"></div>
            <div class="fg"><label>Email Address</label><input type="email" id="email" value="admin@hostel.com" /></div>
            <div class="fg"><label>Password</label><input type="password" id="pass" value="admin123" /></div>
            <button class="btn-login" id="loginBtn" onclick="login()">Sign In →</button>
            <p class="hint">Demo credentials auto-filled &middot; <a
                    onclick="window.open('http://127.0.0.1:8000/docs')">API Docs ↗</a></p>
        </div>
    </div>
    <script>
        function setRole(email, pass, el) {
            document.getElementById('email').value = email;
            document.getElementById('pass').value = pass;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        async function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errBox');
            err.style.display = 'none'; btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await fetch('http://127.0.0.1:8000/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}` });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Login failed');
                localStorage.setItem('hostel_token', data.access_token);
                localStorage.setItem('hostel_email', email);
                location.href = 'dashboard.html';
            } catch (e) { err.textContent = e.message; err.style.display = 'block'; }
            finally { btn.disabled = false; btn.textContent = 'Sign In →'; }
        }
        document.querySelectorAll('input').forEach(i => i.addEventListener('keypress', e => { if (e.key === 'Enter') login(); }));
    </script>
</body>

</html>
