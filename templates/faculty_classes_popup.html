<div class="popup-container">
    <h2><i class="fas fa-users"></i> My Classes</h2>
    <p>Select a class to mark attendance</p>

    <div class="classes-grid">
        {% for class in classes %}
        <div class="class-card">
            <div class="class-header">
                <span class="subject-code">{{ class.subject_code }}</span>
                <span class="student-count">
                    <i class="fas fa-users"></i> {{ class.student_count }} Students
                </span>
            </div>
            <h3>{{ class.subject_name }}</h3>
            <p>Credits: {{ class.credits }}</p>
            <button class="btn btn-primary btn-sm" onclick="markAttendance({{ class.id }})">
                <i class="fas fa-clipboard-check"></i> Mark Attendance
            </button>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .popup-container {
        padding: 20px;
    }

    .popup-container h2 {
        margin-bottom: 10px;
        color: var(--text-primary);
    }

    .popup-container>p {
        color: var(--text-secondary);
        margin-bottom: 30px;
    }

    .classes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .class-card {
        background: rgba(255, 255, 255, 0.03);
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        transition: var(--transition);
    }

    .class-card:hover {
        border-color: var(--primary);
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.06);
    }

    .class-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
    }

    .subject-code {
        background: var(--primary);
        color: white;
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 12px;
        font-weight: 600;
    }

    .student-count {
        color: var(--text-secondary);
        font-size: 13px;
    }

    .class-card h3 {
        font-size: 18px;
        margin-bottom: 10px;
        color: var(--text-primary);
    }

    .class-card p {
        color: var(--text-secondary);
        margin-bottom: 15px;
    }
</style>
