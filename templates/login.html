{% extends "base.html" %}

{% block title %}Login - evrythghere{% endblock %}

{% block content %}
<div class="login-wrapper"
    style="height: 100vh; display: flex; align-items: center; justify-content: center; background: fixed;">
    <div class="glass-panel"
        style="width: 100%; max-width: 450px; padding: 50px; position: relative; overflow: hidden;">
        <div
            style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--primary); filter: blur(70px); opacity: 0.3;">
        </div>

        <div style="text-align: center; margin-bottom: 40px;">
            <div
                style="width: 70px; height: 70px; background: var(--primary); border-radius: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <h1 style="font-size: 30px; margin-bottom: 10px;">Welcome Back</h1>
            <p style="color: var(--text-secondary); font-size: 14px;">Sign in to your evrythghere portal</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div style="margin-bottom: 25px;">
                <label
                    style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary);">USERNAME
                    / STUDENT ID</label>
                <input type="text" name="username" required autofocus
                    style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; outline: none; transition: var(--transition);"
                    placeholder="e.g. 2024001"
                    onfocus="this.style.borderColor='var(--primary)'; this.style.background='rgba(255,255,255,0.08)'"
                    onblur="this.style.borderColor='var(--glass-border)'; this.style.background='rgba(255,255,255,0.05)'">
            </div>

            <div style="margin-bottom: 30px;">
                <label
                    style="display: block; font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary);">PASSWORD</label>
                <input type="password" name="password" required
                    style="width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; outline: none; transition: var(--transition);"
                    placeholder="••••••••"
                    onfocus="this.style.borderColor='var(--primary)'; this.style.background='rgba(255,255,255,0.08)'"
                    onblur="this.style.borderColor='var(--glass-border)'; this.style.background='rgba(255,255,255,0.05)'">
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; padding: 15px; font-size: 16px;">
                Login to Portal <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div
            style="margin-top: 35px; padding-top: 25px; border-top: 1px solid var(--glass-border); text-align: center;">
            <p style="font-size: 12px; color: var(--text-secondary);">Trouble logging in? Contact Administrator</p>
        </div>
    </div>
</div>

<style>
    /* Prevent sidebar on login page */
    .sidebar {
        display: none !important;
    }

    .main-content {
        margin-left: 0 !important;
        padding: 0 !important;
    }
</style>
{% endblock %}
